name: CI
on: [push, pull_request]

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        path: windswept-colony

    # The net-handler gate + allowlist live in the framework and cover the whole
    # product. Check the framework out as a sibling so the shared gate can scan
    # this schema (the schema DeriveGamemode()s the framework anyway).
    - name: Pull windswept framework (for the shared net-handler gate)
      uses: actions/checkout@v2
      with:
        repository: noahsabaj/windswept
        path: windswept

    - uses: leafo/gh-actions-lua@v8.0.0
      with:
        luaVersion: "5.2"

    - uses: leafo/gh-actions-luarocks@v4.0.0

    # GLua-aware luacheck fork (understands !, &&, continue, etc.)
    - name: Pull gluacheck
      uses: actions/checkout@v2
      with:
        repository: impulsh/gluacheck
        path: luacheck

    - name: Build gluacheck
      working-directory: luacheck
      run: luarocks make

    - name: Lint
      working-directory: windswept-colony
      run: luacheck .

    # Ratchet: new client->server net.Receive must use ws.action / ws.weapon.NetReceive,
    # or be justified in the framework's tools/net-handlers.allowlist. Scans this schema
    # (with the framework sibling) against that shared allowlist.
    - name: Net-handler guard gate
      run: bash windswept/tools/check-net-handlers.sh
