name: CI
on: [push, pull_request]

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        path: windswept-colony

    - uses: leafo/gh-actions-lua@v13
      with:
        luaVersion: "5.2"

    - uses: leafo/gh-actions-luarocks@v6

    # GLua-aware luacheck fork (understands !, &&, continue, etc.)
    - name: Pull gluacheck
      uses: actions/checkout@v7
      with:
        repository: impulsh/gluacheck
        path: luacheck

    - name: Build gluacheck
      working-directory: luacheck
      run: luarocks make

    - name: Lint
      working-directory: windswept-colony
      run: luacheck .

    # Ratchet: new client->server net.Receive must use ws.action / ws.weapon.NetReceive,
    # or be justified in tools/net-handlers.allowlist (this schema's self-contained gate).
    - name: Net-handler guard gate
      working-directory: windswept-colony
      run: bash tools/check-net-handlers.sh

    # Cross-repo guard: every custom ws* panel the schema or framework instantiates must be
    # registered somewhere across the co-loaded repos. Catches the wsBirthDatePicker class of
    # crash (a referenced panel no loaded repo defines) -- which luacheck can't see (plain string).
    - name: Pull framework (for cross-repo panel check)
      uses: actions/checkout@v7
      with:
        repository: noahsabaj/windswept
        path: windswept

    - name: Unregistered-panel guard
      run: bash windswept-colony/tools/check-panels.sh windswept windswept-colony
